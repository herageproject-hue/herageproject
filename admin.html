<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<meta charset="UTF-8">
<title>Admin Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  font-family:Arial;
}

.sidebar{
  width:300px;
  border-right:1px solid #ddd;
  overflow-y:auto;
}

.chat-list-item{
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.chat-list-item:hover{
  background:#f5f5f5;
}

.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  background:#f5f5f5;
}

/* USER = kiri putih */

.user-message{
  background:#fff;
  color:#111;
  border:1px solid #ddd;
  padding:10px 14px;
  border-radius:16px;
  margin-bottom:10px;
  margin-right:auto;
  width:fit-content;
  max-width:70%;
}

/* ADMIN = kanan hitam */

.admin-message{
  background:#111827;
  color:#fff;
  padding:10px 14px;
  border-radius:16px;
  margin-bottom:10px;
  margin-left:auto;
  width:fit-content;
  max-width:70%;
}

.input-area{
  display:flex;
  padding:10px;
  border-top:1px solid #ddd;
}

.input-area input{
  flex:1;
  padding:12px;
}

.chat-list-item small{
  color:#777;
  display:block;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.message-time{
  font-size:11px;
  opacity:.7;
  margin-top:4px;
  text-align:right;
}

.chat-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-time{
  font-size:11px;
  color:#888;
}

.search-box{
  padding:12px;
}

.search-box input{
  width:100%;
  box-sizing:border-box;
  padding:12px 16px;
  border:none;
  border-radius:25px;
  background:#f0f2f5;
}

.search-box input:focus{
  background:#fff;
  box-shadow:0 0 0 2px #25d36633;
}  

.chat-preview{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-top:4px;
}

.chat-preview small{
  flex:1;
  color:#777;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.badge{
  background:#111827;
  color:white;
  width:20px;
  height:20px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:bold;
  flex-shrink:0;
  margin-left:10px;
}  

.chat-filter{
  display:flex;
  gap:10px;
  padding:0 12px 12px;
}

.filter-btn{
  border:1px solid #2a2a2a;
  background:transparent;
  color:#aaa;
  padding:10px 20px;
  border-radius:25px;
  cursor:pointer;
  font-weight:600;
}

.filter-btn.active{
  background:#111827;
  border-color:#1f6f54;
  color:white;
}

.filter-btn span{
  margin-left:5px;
}  

.chat-header-admin{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px;
  border-bottom:1px solid #ddd;
  background:white;
  font-weight:bold;
}

.chat-header-actions button{
  background:none;
  border:none;
  font-size:22px;
  cursor:pointer;
}

#chatSearch{
  width:100%;
  box-sizing:border-box;
  padding:12px 16px;
  border:none;
  border-radius:25px;
  background:#f0f2f5;
}

.image-btn{
  background:none;
  border:none;
  cursor:pointer;
  padding:0 10px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.upload-icon{
  width:30px;
  height:30px;
  object-fit:contain;
}
</style>

</head>

<body>

<div class="sidebar">

  <div style="
    padding:15px;
    border-bottom:1px solid #ddd;
  ">
    <button onclick="logoutAdmin()">
      Logout
    </button>
  </div>

  <div class="search-box">
    <input
      type="text"
      id="searchUser"
      placeholder="Search or start a new chat"
      onkeyup="loadUsers()">
  </div>

  <div class="chat-filter">
    <button class="filter-btn active" onclick="setFilter('all')">
      All
    </button>

    <button class="filter-btn" onclick="setFilter('unread')">
      Unread <span id="unreadTotal">0</span>
    </button>
  </div>

  <div id="userList"></div>

</div>

<div class="chat-area">

  <div id="chatHeader" class="chat-header-admin">

    <div id="chatUserName">
      Pilih user...
    </div>

    <div class="chat-header-actions">

      <button onclick="toggleChatSearch()">
        <span class="material-icons">search</span>
      </button>

    </div>

  </div>

  <div
    id="chatSearchBar"
    style="display:none;padding:10px;border-bottom:1px solid #ddd;"
  >

    <input
      type="text"
      id="chatSearch"
      placeholder="Cari pesan..."
      onkeyup="searchChatMessages()">

  </div>

  <div
    id="messages"
    class="messages">
  </div>

  <div class="input-area">

    <input
      type="file"
      id="imageInput"
      accept="image/*"
      style="display:none">

    <button
      class="image-btn"
      onclick="document.getElementById('imageInput').click()">

      <img
        src="image.PNG"
        alt="Upload"
        class="upload-icon">

    </button>

    <input
      id="adminMessage"
      placeholder="Type message...">

    <button onclick="sendAdminMessage()">
      Send
    </button>

  </div>

</div>
<script>

const supabaseUrl =
'https://bxsrbfaecrmuaziakyvi.supabase.co';

const supabaseKey =
'sb_publishable_K9COA9-im9N0B5dIj37HPQ_7pqqZ42z';

const supabaseClient =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

checkAdmin();

async function checkAdmin(){

  const {
    data:{ user }
  } = await supabaseClient.auth.getUser();

  if(!user){

    location.href =
      "admin-login.html";

    return;
  }

  const { data, error } =
    await supabaseClient
      .from("admins")
      .select("*")
      .eq("id", user.id)
      .single();

  if(error || !data){

    alert("Access denied");

    await supabaseClient.auth.signOut();

    location.href =
      "admin-login.html";

    return;
  }

  loadUsers();

}
  
let selectedUserId = null;

async function logoutAdmin(){

  const confirmLogout =
    confirm("Logout dari Admin?");

  if(!confirmLogout) return;

  await supabaseClient.auth.signOut();

  location.href =
    "admin-login.html";

}  

function formatTime(dateString){
  return new Date(dateString)
    .toLocaleTimeString("id-ID",{
      hour:"2-digit",
      minute:"2-digit"
    });
}

let currentFilter = "all";

function setFilter(filter){

  currentFilter = filter;

  document
    .querySelectorAll(".filter-btn")
    .forEach(btn => btn.classList.remove("active"));

  event.target.classList.add("active");

  loadUsers();
}
  
async function loadUsers(){

  let totalUnread = 0;
  
  const { data: chats } =
    await supabaseClient
      .from("chats")
      .select("*")
      .order("created_at", {
        ascending:false
      });

  const latestUsers = {};

  chats.forEach(chat => {

    if(!latestUsers[chat.user_id]){

      latestUsers[chat.user_id] = chat;

    }

  });

  const userIds =
    Object.keys(latestUsers);

  const { data: users } =
    await supabaseClient
      .from("profiles")
      .select("*")
      .in("id", userIds);

  const box =
    document.getElementById("userList");

  box.innerHTML = "";

  const keyword =
    document.getElementById("searchUser")
    ?.value
    .toLowerCase() || "";

  for(const id of userIds){

    const user =
      users.find(u => u.id === id);

    if(!user) continue;

    const userName =
      (user.full_name || "")
      .toLowerCase();

    if(
      keyword &&
      !userName.includes(keyword)
    ){
      continue;
    }

    const { count } =
      await supabaseClient
        .from("chats")
        .select("*", {
          count:"exact",
          head:true
        })
        .eq("user_id", id)
        .eq("sender", "user")
        .eq("is_read", false);

    totalUnread += count || 0;

    if(currentFilter === "unread" && count === 0){
      continue;
    }
    
    console.log(
      "USER:",
      id,
      "COUNT:",
      count
    );

    box.innerHTML += `
      <div class="chat-list-item"
        onclick="openUserChat('${id}')">

        <div class="chat-header">

          <b>${user.full_name || "No Name"}</b>

          <span class="chat-time">
            ${formatTime(latestUsers[id].created_at)}
          </span>

        </div>

        <div class="chat-preview">

          <small>
            ${latestUsers[id].message}
          </small>

          ${
            count > 0 && selectedUserId !== id
            ? `<span class="badge">${count}</span>`
            : ""
          }

        </div>

      </div>
    `;

  }
  document.getElementById("unreadTotal").innerText =
  totalUnread;
}

/* REALTIME USER LIST */
supabaseClient
  .channel("admin-users")
  .on(
    "postgres_changes",
    {
      event: "INSERT",
      schema: "public",
      table: "chats"
    },
    async payload => {

      if(payload.new.sender === "user"){

        new Audio(
          "https://actions.google.com/sounds/v1/cartoon/pop.ogg"
        ).play();

      }

      if(
        selectedUserId &&
        payload.new.user_id === selectedUserId
      ){

        if(payload.new.sender === "user"){

          await supabaseClient
            .from("chats")
            .update({
              is_read:true
            })
            .eq("id", payload.new.id);

        }

        const box =
          document.getElementById("messages");

        box.innerHTML += `
          <div class="${
            payload.new.sender === "user"
            ? "user-message"
            : "admin-message"
          }">

            <div>

              ${
                payload.new.image_url
                ? `
                  <img
                    src="${payload.new.image_url}"
                    style="
                      max-width:250px;
                      border-radius:10px;
                      display:block;
                      margin-bottom:8px;
                    ">
                `
                : ""
              }

              ${payload.new.message || ""}

            </div>

            <div class="message-time">
              ${formatTime(
                payload.new.created_at
              )}
            </div>

          </div>
        `;

        box.scrollTop =
          box.scrollHeight;

      }

      loadUsers();

    }
  )
  .subscribe();

function toggleChatSearch(){

  const bar =
    document.getElementById(
      "chatSearchBar"
    );

  bar.style.display =
    bar.style.display === "none"
    ? "block"
    : "none";

}

function searchChatMessages(){

  const keyword =
    document
      .getElementById("chatSearch")
      .value
      .toLowerCase();

  document
    .querySelectorAll(
      ".user-message, .admin-message"
    )
    .forEach(msg => {

      const text =
        msg.innerText.toLowerCase();

      msg.style.display =
        text.includes(keyword)
        ? ""
        : "none";

    });

}  

async function openUserChat(userId){

  selectedUserId = userId;

  const { data:userData } =
    await supabaseClient
      .from("profiles")
      .select("*")
      .eq("id", userId)
      .single();

  document.getElementById(
    "chatUserName"
  ).innerText =
    userData.full_name ||
    userData.email ||
    "Guest User";

  const { data, error } =
    await supabaseClient
      .from("chats")
      .select("*")
      .eq("user_id", userId)
      .order("created_at");

  if(error){
    console.log(error);
    return;
  }

  // tandai chat user sudah dibaca
  const { error: updateError } =
    await supabaseClient
      .from("chats")
      .update({
        is_read:true
      })
      .eq("user_id", userId)
      .eq("sender", "user")
      .eq("is_read", false);

  const { data: unreadCheck } =
    await supabaseClient
      .from("chats")
      .select("id,is_read")
      .eq("user_id", userId)
      .eq("sender", "user")
      .eq("is_read", false);

  console.log("UNREAD:", unreadCheck);

  console.log("UPDATE ERROR:", updateError);

  const { data: checkData } =
    await supabaseClient
      .from("chats")
      .select("id,is_read,sender")
      .eq("user_id", userId)
      .eq("sender","user");

  console.log("CHECK:", checkData);

  const box =
    document.getElementById("messages");

  box.innerHTML = "";

  let lastDate = "";

  data.forEach(msg => {

    const msgDate =
      new Date(msg.created_at);

    const today =
      new Date();

    const yesterday =
      new Date();

    yesterday.setDate(
      yesterday.getDate() - 1
    );

    let dateLabel;

    if(
      msgDate.toDateString() ===
      today.toDateString()
    ){

      dateLabel = "Hari Ini";

    }
    else if(
      msgDate.toDateString() ===
      yesterday.toDateString()
    ){

      dateLabel = "Kemarin";

    }
    else{

      dateLabel =
        msgDate.toLocaleDateString(
          "id-ID",
          {
            day:"numeric",
            month:"long",
            year:"numeric"
          }
        );

    }

    if(dateLabel !== lastDate){

      box.innerHTML += `
        <div style="
          text-align:center;
          margin:15px 0;
        ">
          <span style="
            background:#ddd;
            padding:6px 12px;
            border-radius:20px;
            font-size:12px;
            color:#555;
          ">
            ${dateLabel}
          </span>
        </div>
      `;

      lastDate = dateLabel;

    }

    box.innerHTML += `
      <div class="${
        msg.sender === "user"
        ? "user-message"
        : "admin-message"
      }">

        <div>

          ${
            msg.image_url
            ? `
              <img
                src="${msg.image_url}"
                style="
                  max-width:250px;
                  border-radius:10px;
                  display:block;
                  margin-bottom:8px;
                ">
            `
            : ""
          }

          ${msg.message || ""}

        </div>

        <div class="message-time">
          ${formatTime(msg.created_at)}
        </div>

      </div>
    `;

  });

  box.scrollTop =
    box.scrollHeight;
  loadUsers();
 
}

async function sendAdminMessage(){

  if(!selectedUserId){
    alert("Pilih user dulu");
    return;
  }

  const input =
    document.getElementById("adminMessage");

  const imageFile =
    document.getElementById("imageInput")
    .files[0];

  const text =
    input.value.trim();

  let imageUrl = null;

  if(imageFile){

    const fileName =
      Date.now() +
      "_" +
      imageFile.name;

    const { error } =
      await supabaseClient
        .storage
        .from("chat-images")
        .upload(
          fileName,
          imageFile
        );

    if(error){
      alert(error.message);
      return;
    }

    const { data: publicUrlData } =
      supabaseClient
        .storage
        .from("chat-images")
        .getPublicUrl(fileName);

    imageUrl = publicUrlData.publicUrl;

    console.log("IMAGE URL:", imageUrl);

  }

  if(!text && !imageUrl){
    return;
  }

  console.log({
    user_id:selectedUserId,
    sender:"admin",
    message:text,
    image_url:imageUrl
  });

  const result =
    await supabaseClient
      .from("chats")
      .insert({
        user_id:selectedUserId,
        sender:"admin",
        message:text,
        image_url:imageUrl
      });

  console.log("INSERT RESULT:", result);

input.value = "";

document.getElementById(
  "imageInput"
).value = "";
}
</script>
</body>
</html>
