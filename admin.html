<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  font-family:Arial;
}

.sidebar{
  width:300px;
  border-right:1px solid #ddd;
  overflow-y:auto;
}

.chat-list-item{
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.chat-list-item:hover{
  background:#f5f5f5;
}

.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  background:#f5f5f5;
}

.user-message{
  background:#111;
  color:#fff;
  padding:10px 14px;
  border-radius:16px;
  margin-bottom:10px;
  margin-left:auto;
  width:fit-content;
}

.admin-message{
  background:#fff;
  border:1px solid #ddd;
  padding:10px 14px;
  border-radius:16px;
  margin-bottom:10px;
  width:fit-content;
}

.input-area{
  display:flex;
  padding:10px;
  border-top:1px solid #ddd;
}

.input-area input{
  flex:1;
  padding:12px;
}

</style>

</head>

<body>

<div class="sidebar" id="userList">

</div>

<div class="chat-area">

  <div
    id="messages"
    class="messages">
  </div>

  <div class="input-area">

    <input
      id="adminMessage"
      placeholder="Type message...">

    <button onclick="sendAdminMessage()">
      Send
    </button>

  </div>

</div>
<script>

const supabaseUrl =
'https://bxsrbfaecrmuaziakyvi.supabase.co';

const supabaseKey =
'sb_publishable_K9COA9-im9N0B5dIj37HPQ_7pqqZ42z';

const supabaseClient =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

let selectedUserId = null;

async function loadUsers(){

  const { data, error } =
    await supabaseClient
      .from("chats")
      .select("*");

  console.log(data);

  const box =
    document.getElementById("userList");

  box.innerHTML = "";

  const users = {};

  data.forEach(chat => {

    if(!users[chat.user_id]){
      users[chat.user_id] = true;

      box.innerHTML += `
        <div
          class="chat-list-item"
          onclick="openUserChat('${chat.user_id}')">

          <b>User</b><br>
          ${chat.user_id}

        </div>
      `;
    }

  });

}

loadUsers();

/* REALTIME USER LIST */
supabaseClient
  .channel("admin-users")

  .on(
    "postgres_changes",
    {
      event: "INSERT",
      schema: "public",
      table: "chats"
    },
    payload => {

      // refresh daftar user
      loadUsers();

      // jika chat yg sedang dibuka
      if(
        selectedUserId &&
        payload.new.user_id === selectedUserId
      ){

        const box =
          document.getElementById("messages");

        box.innerHTML += `
          <div class="${
            payload.new.sender === "user"
            ? "user-message"
            : "admin-message"
          }">
            ${payload.new.message}
          </div>
        `;

        box.scrollTop =
          box.scrollHeight;
      }

    }
  )

  .subscribe();

async function sendAdminMessage(){

  if(!selectedUserId){
    alert("Pilih user dulu");
    return;
  }

  const input =
    document.getElementById("adminMessage");

  const text =
    input.value.trim();

  if(!text) return;

  await supabaseClient
    .from("chats")
    .insert({
      user_id:selectedUserId,
      sender:"admin",
      message:text
    });

  input.value = "";
}

loadUsers();
</script>
</body>
</html>
