<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Chat</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  font-family:Arial;
}

.sidebar{
  width:320px;
  background:#111b21;
  color:white;
  border-right:1px solid #222e35;
  overflow-y:auto;
}

.chat-list-item{
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

.chat-list-item:hover{
  background:#f5f5f5;
}

.chat-area{
  flex:1;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  padding:20px;
  overflow-y:auto;
  background:#f5f5f5;
}

.user-message{
  background:#005c4b;
  color:white;
  padding:8px 12px;
  border-radius:8px;
  margin-left:auto;
  margin-bottom:8px;
  max-width:70%;
}

.admin-message{
  background:white;
  color:#111;
  padding:8px 12px;
  border-radius:8px;
  margin-bottom:8px;
  max-width:70%;
  border:none;
}

.input-area{
  background:#202c33;
  padding:10px;
  display:flex;
  gap:10px;
}

.input-area input{
  flex:1;
  border:none;
  outline:none;
  background:#2a3942;
  color:white;
  border-radius:8px;
  padding:12px;
}

.input-area button{
  background:#00a884;
  color:white;
  border:none;
  border-radius:8px;
  padding:0 20px;
  cursor:pointer;
}  

.chat-list-item small{
  color:#777;
  display:block;
  margin-top:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.badge{
  background:red;
  color:white;
  border-radius:50%;
  min-width:20px;
  height:20px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  margin-right:6px;
}

.message-time{
  font-size:11px;
  opacity:.7;
  margin-top:4px;
  text-align:right;
}

.chat-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-time{
  font-size:11px;
  color:#888;
}

.chat-top{
  height:60px;
  background:#202c33;
  color:white;
  display:flex;
  align-items:center;
  padding:0 20px;
  font-weight:600;
  border-bottom:1px solid #2a3942;
}

.search-box{
  padding:10px;
  background:#202c33;
}

.search-box input{
  width:100%;
  border:none;
  outline:none;
  background:#2a3942;
  color:white;
  padding:10px;
  border-radius:8px;
}
  
</style>

</head>

<body>

<div class="sidebar">

  <div style="
    padding:15px;
    border-bottom:1px solid #ddd;
  ">
    <button onclick="logoutAdmin()">
      Logout
    </button>
  </div>

  <div class="search-box">
    <input
      type="text"
      id="searchUser"
      placeholder="Search chat...">
  </div>

  <div id="userList"></div>

</div>

<div class="chat-area">

  <div id="chatHeader" class="chat-top">
    Pilih user...
  </div>

  <div
    id="messages"
    class="messages">
  </div>

  <div class="input-area">

    <input
      id="adminMessage"
      placeholder="Type message...">

    <button onclick="sendAdminMessage()">
      Send
    </button>

  </div>

</div>
<script>

const supabaseUrl =
'https://bxsrbfaecrmuaziakyvi.supabase.co';

const supabaseKey =
'sb_publishable_K9COA9-im9N0B5dIj37HPQ_7pqqZ42z';

const supabaseClient =
supabase.createClient(
  supabaseUrl,
  supabaseKey
);

checkAdmin();

async function checkAdmin(){

  const {
    data:{ user }
  } = await supabaseClient.auth.getUser();

  if(!user){

    location.href =
      "admin-login.html";

    return;
  }

  const { data, error } =
    await supabaseClient
      .from("admins")
      .select("*")
      .eq("id", user.id)
      .single();

  if(error || !data){

    alert("Access denied");

    await supabaseClient.auth.signOut();

    location.href =
      "admin-login.html";

    return;
  }

  loadUsers();

}
  
let selectedUserId = null;

async function logoutAdmin(){

  const confirmLogout =
    confirm("Logout dari Admin?");

  if(!confirmLogout) return;

  await supabaseClient.auth.signOut();

  location.href =
    "admin-login.html";

}  

function formatTime(dateString){
  return new Date(dateString)
    .toLocaleTimeString("id-ID",{
      hour:"2-digit",
      minute:"2-digit"
    });
}
  
async function loadUsers(){

  const { data: chats } =
    await supabaseClient
      .from("chats")
      .select("*")
      .order("created_at", {
        ascending:false
      });

  const latestUsers = {};

  chats.forEach(chat => {

    if(!latestUsers[chat.user_id]){

      latestUsers[chat.user_id] = chat;

    }

  });

  const userIds =
    Object.keys(latestUsers);

  const { data: users } =
    await supabaseClient
      .from("profiles")
      .select("*")
      .in("id", userIds);

  const box =
    document.getElementById("userList");

  box.innerHTML = "";

  for(const id of userIds){

    const user =
      users.find(u => u.id === id);

    if(!user) continue;

    const { count } =
      await supabaseClient
        .from("chats")
        .select("*", {
          count:"exact",
          head:true
        })
        .eq("user_id", id)
        .eq("sender", "user")
        .eq("is_read", false);

    console.log(
      "USER:",
      id,
      "COUNT:",
      count
    );

    box.innerHTML += `
      <div
        class="chat-list-item"
        onclick="openUserChat('${id}')">

        ${
          count > 0 && selectedUserId !== id
          ? `<span class="badge">${count}</span>`
          : ""
        }

        <div class="chat-header">

          <b>${user.full_name || "No Name"}</b>

          <span class="chat-time">
            ${formatTime(
              latestUsers[id].created_at
            )}
          </span>

        </div>

        <small>
          ${latestUsers[id].message}
        </small>

      </div>
    `;

  }

}

/* REALTIME USER LIST */
supabaseClient
  .channel("admin-users")
  .on(
    "postgres_changes",
    {
      event: "INSERT",
      schema: "public",
      table: "chats"
    },
    async payload => {

      if(payload.new.sender === "user"){

        new Audio(
          "https://actions.google.com/sounds/v1/cartoon/pop.ogg"
        ).play();

      }

      if(
        selectedUserId &&
        payload.new.user_id === selectedUserId
      ){

        if(payload.new.sender === "user"){

          await supabaseClient
            .from("chats")
            .update({
              is_read:true
            })
            .eq("id", payload.new.id);

        }

        const box =
          document.getElementById("messages");

        box.innerHTML += `
          <div class="${
            payload.new.sender === "user"
            ? "user-message"
            : "admin-message"
          }">

            <div>
              ${payload.new.message}
            </div>

            <div class="message-time">
              ${formatTime(
                payload.new.created_at
              )}
            </div>

          </div>
        `;

        box.scrollTop =
          box.scrollHeight;

      }

      loadUsers();

    }
  )
  .subscribe();

async function openUserChat(userId){

  selectedUserId = userId;

  const { data:userData } =
    await supabaseClient
      .from("profiles")
      .select("*")
      .eq("id", userId)
      .single();

  document.getElementById(
    "chatHeader"
  ).innerHTML =
    userData.full_name ||
    userData.email ||
    "Guest User";

  const { data, error } =
    await supabaseClient
      .from("chats")
      .select("*")
      .eq("user_id", userId)
      .order("created_at");

  if(error){
    console.log(error);
    return;
  }

  // tandai chat user sudah dibaca
  const { error: updateError } =
    await supabaseClient
      .from("chats")
      .update({
        is_read:true
      })
      .eq("user_id", userId)
      .eq("sender", "user")
      .eq("is_read", false);

  const { data: unreadCheck } =
    await supabaseClient
      .from("chats")
      .select("id,is_read")
      .eq("user_id", userId)
      .eq("sender", "user")
      .eq("is_read", false);

  console.log("UNREAD:", unreadCheck);

  console.log("UPDATE ERROR:", updateError);

  const { data: checkData } =
    await supabaseClient
      .from("chats")
      .select("id,is_read,sender")
      .eq("user_id", userId)
      .eq("sender","user");

  console.log("CHECK:", checkData);

  const box =
    document.getElementById("messages");

  box.innerHTML = "";

  let lastDate = "";

  data.forEach(msg => {

    const msgDate =
      new Date(msg.created_at);

    const today =
      new Date();

    const yesterday =
      new Date();

    yesterday.setDate(
      yesterday.getDate() - 1
    );

    let dateLabel;

    if(
      msgDate.toDateString() ===
      today.toDateString()
    ){

      dateLabel = "Hari Ini";

    }
    else if(
      msgDate.toDateString() ===
      yesterday.toDateString()
    ){

      dateLabel = "Kemarin";

    }
    else{

      dateLabel =
        msgDate.toLocaleDateString(
          "id-ID",
          {
            day:"numeric",
            month:"long",
            year:"numeric"
          }
        );

    }

    if(dateLabel !== lastDate){

      box.innerHTML += `
        <div style="
          text-align:center;
          margin:15px 0;
        ">
          <span style="
            background:#ddd;
            padding:6px 12px;
            border-radius:20px;
            font-size:12px;
            color:#555;
          ">
            ${dateLabel}
          </span>
        </div>
      `;

      lastDate = dateLabel;

    }

    box.innerHTML += `
      <div class="${
        msg.sender === "user"
        ? "user-message"
        : "admin-message"
      }">

        <div>
          ${msg.message}
        </div>

        <div class="message-time">
          ${formatTime(msg.created_at)}
        </div>

      </div>
    `;

  });

  box.scrollTop =
    box.scrollHeight;
  loadUsers();
 
}

async function sendAdminMessage(){

  if(!selectedUserId){
    alert("Pilih user dulu");
    return;
  }

  const input =
    document.getElementById("adminMessage");

  const text =
    input.value.trim();

  if(!text) return;

  await supabaseClient
    .from("chats")
    .insert({
      user_id:selectedUserId,
      sender:"admin",
      message:text
    });

  input.value = "";
}

document
  .getElementById("adminMessage")
  .addEventListener("keydown", function(e){

    if(e.key === "Enter"){

      e.preventDefault();

      sendAdminMessage();

    }

  });
</script>
</body>
</html>
